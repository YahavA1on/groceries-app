<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Update Foods Database</title>
  <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Assistant', system-ui, -apple-system, sans-serif;
      background: #1a1a1a;
      color: #e8e8e8;
      padding: 20px;
      min-height: 100vh;
    }

    .container {
      max-width: 600px;
      margin: 0 auto;
    }

    h1 {
      margin-bottom: 20px;
      font-size: 24px;
    }

    .button-group {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    button {
      padding: 10px 20px;
      font-family: 'Assistant', sans-serif;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.2s;
    }

    .btn-danger {
      background: #ff4444;
      color: white;
    }

    .btn-danger:hover {
      background: #cc0000;
    }

    .btn-primary {
      background: #4CAF50;
      color: white;
    }

    .btn-primary:hover {
      background: #45a049;
    }

    .status {
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 20px;
      display: none;
    }

    .status.show {
      display: block;
    }

    .status.success {
      background: #2d5016;
      color: #90ee90;
      border: 1px solid #90ee90;
    }

    .status.error {
      background: #5a1a1a;
      color: #ff6b6b;
      border: 1px solid #ff6b6b;
    }

    .status.loading {
      background: #1a3a5a;
      color: #87ceeb;
      border: 1px solid #87ceeb;
    }

    .progress {
      margin-top: 10px;
      font-size: 12px;
    }

    .foods-list {
      background: #2a2a2a;
      border-radius: 8px;
      padding: 15px;
      max-height: 400px;
      overflow-y: auto;
    }

    .food-item {
      padding: 8px;
      margin: 5px 0;
      background: #333;
      border-radius: 4px;
      font-size: 13px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .food-item.success {
      border-right: 3px solid #90ee90;
    }

    .food-item.error {
      border-right: 3px solid #ff6b6b;
    }

    .food-status {
      font-size: 11px;
      color: #aaa;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🛒 עדכון מסד נתונים של מזון</h1>
    
    <div class="button-group">
      <button class="btn-danger" onclick="deleteAllFoods()">🗑️ מחק את כל המזון</button>
      <button class="btn-primary" onclick="addNewFoods()">➕ הוסף מזון חדש</button>
    </div>

    <div class="status" id="status"></div>
    
    <div id="foodsList"></div>
  </div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.106.1/+esm'

    const SUPABASE_URL = 'https://erfkngpyauhibcjfsszx.supabase.co'
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVyZmtuZ3B5YXVoaWJjamZzc3p4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzcyMzE5NTYsImV4cCI6MjA1MjgwNzk1Nn0.01P-V-V77n9HZlgYDt1yqr8hTvvZqGI_VL0eXCvXVYs'

    const supabase = createClient(SUPABASE_URL, SUPABASE_KEY)

    const foodsData = [
      { name: 'בשר טחון', query: 'ground beef' },
      { name: 'טורטיות', query: 'tortillas' },
      { name: 'פסטה קונכיות', query: 'pasta shells' },
      { name: 'חזה עוף', query: 'chicken breast' },
      { name: 'פירורי לחם', query: 'breadcrumbs' },
      { name: 'ביצים', query: 'eggs' },
      { name: 'תפוחי אדמה', query: 'potatoes' },
      { name: 'פתיתים', query: 'cereal flakes' },
      { name: 'טונה בקופסה', query: 'canned tuna' },
      { name: 'רוטב עגבניות', query: 'tomato sauce' },
      { name: 'עגבניות מרוסקות', query: 'crushed tomatoes' },
      { name: 'רסק עגבניות', query: 'tomato paste' },
      { name: 'פסטו', query: 'pesto' },
      { name: 'שמנת לבישול', query: 'cooking cream' },
      { name: 'חלב', query: 'milk' },
      { name: 'חמאה', query: 'butter' },
      { name: 'גבינה צהובה', query: 'yellow cheese' },
      { name: 'גבינה מגורדת', query: 'grated cheese' },
      { name: 'אבקת חלבון', query: 'protein powder' },
      { name: 'מעדן חלבון', query: 'protein snack' },
      { name: 'פיצה מעדנות קפואה', query: 'frozen pizza' },
      { name: 'בצל', query: 'onion' },
      { name: 'שום', query: 'garlic' }
    ]

    window.deleteAllFoods = async function() {
      if (!confirm('⚠️ Are you sure? This will delete ALL foods!')) return

      showStatus('loading', 'מוחק את כל המזון...')
      
      try {
        const { error } = await supabase
          .from('foods')
          .delete()
          .neq('id', '')

        if (error) throw error
        showStatus('success', '✅ כל המזון נמחק בהצלחה!')
      } catch (err) {
        showStatus('error', `❌ שגיאה: ${err.message}`)
      }
    }

    window.addNewFoods = async function() {
      showStatus('loading', 'טוען תמונות והוסף מזון...')
      const foodsList = document.getElementById('foodsList')
      foodsList.innerHTML = ''

      const newFoods = []
      
      for (let i = 0; i < foodsData.length; i++) {
        const food = foodsData[i]
        updateProgress(`מעבד: ${food.name} (${i + 1}/${foodsData.length})`)
        
        try {
          const imageUrl = await fetchImage(food.query)
          
          newFoods.push({
            name: food.name,
            picture_url: imageUrl,
            manufacturer: null,
            price: 0,
            unit_qty: null,
          })

          addFoodToList(food.name, imageUrl ? 'success' : 'error', imageUrl ? '✓' : '✗')
          await new Promise(resolve => setTimeout(resolve, 800))
        } catch (err) {
          addFoodToList(food.name, 'error', '✗')
          newFoods.push({
            name: food.name,
            picture_url: null,
            manufacturer: null,
            price: 0,
            unit_qty: null,
          })
        }
      }

      updateProgress(`📤 עלאה ${newFoods.length} מזון...`)

      try {
        const { error } = await supabase
          .from('foods')
          .insert(newFoods)

        if (error) throw error
        showStatus('success', `✅ הוסף בהצלחה ${newFoods.length} מזון!`)
      } catch (err) {
        showStatus('error', `❌ שגיאה בעלאה: ${err.message}`)
      }
    }

    async function fetchImage(query) {
      try {
        const response = await fetch(
          `https://api.unsplash.com/search/photos?query=${encodeURIComponent(query)}&per_page=1&client_id=1VKVHXczgULX1pxJd6qF6e0a_jDe3f7bTVW5xJcE_Bw`
        )
        if (!response.ok) throw new Error('API error')
        const data = await response.json()
        return data.results?.[0]?.urls?.regular || null
      } catch (err) {
        console.log(`Failed to fetch image for ${query}`)
        return null
      }
    }

    function showStatus(type, message) {
      const el = document.getElementById('status')
      el.className = `status show ${type}`
      el.innerHTML = `<div>${message}</div><div class="progress"></div>`
    }

    function updateProgress(message) {
      const progress = document.querySelector('.status .progress')
      if (progress) progress.textContent = message
    }

    function addFoodToList(name, status, indicator) {
      const list = document.getElementById('foodsList')
      const item = document.createElement('div')
      item.className = `food-item ${status}`
      item.innerHTML = `<span>${name}</span><span class="food-status">${indicator}</span>`
      list.appendChild(item)
      list.scrollTop = list.scrollHeight
    }
  </script>
</body>
</html>
